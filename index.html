<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissionMind</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0d12;
      --surface: #111620;
      --surface2: #161c28;
      --border: #1e2736;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.1);
      --accent-mid: rgba(0, 229, 160, 0.3);
      --text: #c8d4e8;
      --text-dim: #4a5568;
      --text-mid: #7a8fa6;
      --warn: #f59e0b;
      --danger: #ef4444;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo-icon::after {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .session-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    .session-badge span {
      color: var(--text-mid);
    }

    .btn-new {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .btn-new:hover {
      border-color: var(--accent-mid);
      color: var(--accent);
    }

    /* SCORES BAR */
    .scores-bar {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 1px;
      background: var(--border);
      flex-shrink: 0;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease;
    }

    .scores-bar.visible {
      max-height: 80px;
    }

    .score-cell {
      flex: 1;
      background: var(--surface2);
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .score-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .score-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }

    .score-value.warn { color: var(--warn); }
    .score-value.danger { color: var(--danger); }

    .score-bar-fill {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 4px;
      overflow: hidden;
    }

    .score-bar-inner {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 1s ease;
    }

    /* MESSAGES */
    .messages-wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 680px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .msg.assistant .msg-avatar {
      background: var(--accent-dim);
      border: 1px solid var(--accent-mid);
      color: var(--accent);
    }

    .msg.user .msg-avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-mid);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 520px;
    }

    .msg.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-top-left-radius: 2px;
    }

    .msg.user .msg-bubble {
      background: var(--accent-dim);
      border: 1px solid var(--accent-mid);
      color: var(--text);
      border-top-right-radius: 2px;
    }

    .msg-time {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    .msg.user .msg-time { text-align: right; }

    /* TYPING INDICATOR */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* INPUT AREA */
    .input-area {
      position: relative;
      z-index: 10;
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent-mid);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
    }

    #userInput::placeholder { color: var(--text-dim); }

    #userInput::-webkit-scrollbar { width: 3px; }
    #userInput::-webkit-scrollbar-thumb { background: var(--border); }

    .send-btn {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      margin-bottom: 2px;
    }

    .send-btn:hover { background: #00ffb0; transform: scale(1.05); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    .send-btn svg { width: 15px; height: 15px; }

    .input-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    /* EMPTY STATE */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      animation: fadeUp 0.5s ease;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      position: relative;
    }

    .empty-icon::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-mid), transparent 60%);
      z-index: -1;
    }

    .empty-title {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--text-mid);
      text-transform: uppercase;
    }

    .empty-desc {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 280px;
      line-height: 1.6;
    }

    .quick-starts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .quick-btn {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-mid);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 7px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .quick-btn:hover {
      border-color: var(--accent-mid);
      color: var(--accent);
      background: var(--accent-dim);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        <div class="logo-text">MissionMind</div>
        <div class="logo-sub">Cognitive State Monitor</div>
      </div>
    </div>
    <div class="header-right">
      <div class="session-badge">SESSION <span id="sessionId">—</span></div>
      <button class="btn-new" onclick="newSession()">New Session</button>
    </div>
  </header>

  <!-- Scores bar - revealed when assessment completes -->
  <div class="scores-bar" id="scoresBar">
    <div class="score-cell">
      <div class="score-label">Stress</div>
      <div class="score-value" id="scoreStress">—</div>
      <div class="score-bar-fill"><div class="score-bar-inner" id="barStress" style="width:0%"></div></div>
    </div>
    <div class="score-cell">
      <div class="score-label">Fatigue</div>
      <div class="score-value" id="scoreFatigue">—</div>
      <div class="score-bar-fill"><div class="score-bar-inner" id="barFatigue" style="width:0%"></div></div>
    </div>
    <div class="score-cell">
      <div class="score-label">Clarity</div>
      <div class="score-value" id="scoreClarity">—</div>
      <div class="score-bar-fill"><div class="score-bar-inner" id="barClarity" style="width:0%"></div></div>
    </div>
    <div class="score-cell">
      <div class="score-label">Stability Score</div>
      <div class="score-value" id="scoreStability">—</div>
      <div class="score-bar-fill"><div class="score-bar-inner" id="barStability" style="width:0%"></div></div>
    </div>
  </div>

  <div class="messages-wrap" id="messagesWrap">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="1.5">
          <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
          <path d="M12 6v6l4 2"/>
        </svg>
      </div>
      <div class="empty-title">Ready for Check-in</div>
      <div class="empty-desc">Start a conversation to begin your cognitive state assessment.</div>
      <div class="quick-starts">
        <button class="quick-btn" onclick="quickStart(`I'm ready to do my check-in`)">Start check-in</button>
        <button class="quick-btn" onclick="quickStart(`Had a rough morning, feeling scattered`)">Rough morning</button>
        <button class="quick-btn" onclick="quickStart(`Everything's going well today`)">Going well</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" rows="1" placeholder="Type your message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a0d12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>

<script>
  let sessionId = generateSessionId();
  let messages = [];
  let isLoading = false;

  document.getElementById('sessionId').textContent = sessionId;

  function generateSessionId() {
    return 'MS-' + Math.random().toString(36).substring(2, 7).toUpperCase();
  }

  function newSession() {
    sessionId = generateSessionId();
    messages = [];
    document.getElementById('sessionId').textContent = sessionId;
    document.getElementById('messagesWrap').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="1.5">
            <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <div class="empty-title">Ready for Check-in</div>
        <div class="empty-desc">Start a conversation to begin your cognitive state assessment.</div>
        <div class="quick-starts">
          <button class="quick-btn" onclick="quickStart('I\\'m ready to do my check-in')">Start check-in</button>
          <button class="quick-btn" onclick="quickStart('Had a rough morning, feeling scattered')">Rough morning</button>
          <button class="quick-btn" onclick="quickStart('Everything\\'s going well today')">Going well</button>
        </div>
      </div>`;
    document.getElementById('scoresBar').classList.remove('visible');
    resetScores();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function quickStart(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function getTime() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function appendMessage(role, content) {
    const wrap = document.getElementById('messagesWrap');
    const emptyState = document.getElementById('emptyState');
    if (emptyState) emptyState.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatarLabel = role === 'assistant' ? 'MM' : 'YOU';
    div.innerHTML = `
      <div>
        <div style="display:flex; align-items:flex-start; gap:12px; ${role === 'user' ? 'flex-direction:row-reverse;' : ''}">
          <div class="msg-avatar">${avatarLabel}</div>
          <div>
            <div class="msg-bubble">${escapeHtml(content)}</div>
            <div class="msg-time">${getTime()}</div>
          </div>
        </div>
      </div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function showTyping() {
    const wrap = document.getElementById('messagesWrap');
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div>
        <div style="display:flex; align-items:flex-start; gap:12px;">
          <div class="msg-avatar">MM</div>
          <div class="msg-bubble typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function hideTyping() {
    const indicator = document.getElementById('typingIndicator');
    if (indicator) indicator.remove();
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function displayScores(data) {
    const bar = document.getElementById('scoresBar');
    bar.classList.add('visible');

    const setScore = (id, barId, value, max = 10) => {
      const el = document.getElementById(id);
      el.textContent = value ?? '—';
      // Color coding
      if (id !== 'scoreStability') {
        if (value >= 8) el.className = 'score-value danger';
        else if (value >= 6) el.className = 'score-value warn';
        else el.className = 'score-value';
      }
      setTimeout(() => {
        document.getElementById(barId).style.width = `${((value ?? 0) / max) * 100}%`;
      }, 100);
    };

    setScore('scoreStress', 'barStress', data.stress_final);
    setScore('scoreFatigue', 'barFatigue', data.fatigue_final);
    setScore('scoreClarity', 'barClarity', data.clarity_final);
    setScore('scoreStability', 'barStability', data.stabilityScore, 100);
  }

  function resetScores() {
    ['scoreStress','scoreFatigue','scoreClarity','scoreStability'].forEach(id => {
      document.getElementById(id).textContent = '—';
    });
    ['barStress','barFatigue','barClarity','barStability'].forEach(id => {
      document.getElementById(id).style.width = '0%';
    });
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    isLoading = true;

    // Add to UI and history
    appendMessage('user', text);
    messages.push({ role: 'user', content: text });

    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: messages })
      });

      const data = await response.json();
      hideTyping();

      const reply = data.reply || "I received your message.";
      appendMessage('assistant', reply);
      messages.push({ role: 'assistant', content: reply });

      if (data.complete) {
        displayScores(data);
      }

    } catch (err) {
      hideTyping();
      appendMessage('assistant', 'Connection error — check your webhook URL.');
      console.error(err);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
